<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — MathVerse AI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .icon {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      font-size: 40px; margin: 0 auto 1.5rem;
    }
    h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 0.75rem; }
    p { color: #94a3b8; font-size: 0.95rem; line-height: 1.6; max-width: 360px; margin: 0 auto 2rem; }
    button {
      background: #6366f1; color: white;
      border: none; border-radius: 12px;
      padding: 0.75rem 2rem; font-size: 0.95rem;
      cursor: pointer; font-weight: 500;
    }
    button:hover { background: #4f46e5; }
  </style>
</head>
<body>
  <div>
    <div class="icon">∑</div>
    <h1>You're offline</h1>
    <p>MathVerse AI needs an internet connection to solve problems and load content. Please check your connection and try again.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
